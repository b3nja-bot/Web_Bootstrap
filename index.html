<!doctype html>

      rel="stylesheet"
    />
    <style>
      html {
        scroll-behavior: smooth;
      }

      .hero {
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),

      }

            <li class="nav-item">
              <a class="nav-link" href="#inicio">Inicio</a>
            </li>
            <li class="nav-item">
